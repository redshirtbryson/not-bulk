  base_url: "http://127.0.0.1:3000"
  secure_cookies: false
storage:
  endpoint: "http://127.0.0.1:9000"
  bucket: "notbulk"
  access_key: "minioadmin"      # compose-local, not secret
  secret_key: "minioadmin"      # compose-local, not secret
