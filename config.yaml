mail: { smtp_host: "127.0.0.1", smtp_port: 1025, from: "NotBulk <magic@notbulk.local>" }
auth:
  session_absolute_days: 30
  session_idle_days: 7
  magic_link_expiry_minutes: 15
  magic_links_per_email_hour: 3
  magic_links_per_email_day: 10
quotas:
